<!DOCTYPE html>
<html lang="en">
<head>
<style>
    body {
        background: linear-gradient(90deg, #2f00ff, #8400ff, #ff0000, #ffe600, #00eeff, #ffae00, #790000);
        background-size: 1000% 900%;
        animation: gradientShift 20s ease infinite;
    }
    @keyframes gradientShift {
        0% {
            background-position: 0% 50%;
        }
        50% {
            background-position: 100% 50%;
        }
        100% {
            background-position: 0% 50%;
        }
    }
    img {
            cursor: pointer;
            border: 10px solid transparent;
            transition: border-color 0.3s;
        }
    img:hover {
        border-color: #0004ff
    }
</style>
</head>
<body>
<a href="flappy-bird/">
    <img src="flappy.png" alt="Example Image" width="300" height="200">
</a>
<script>
</script>
</body>
</html>
